[data-theme="dark"]{--bg:#0f0f12;--bg2:#16161b;--bg3:#1e1e26;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#fff;--text2:rgba(255,255,255,.65);--text3:rgba(255,255,255,.32);--text4:rgba(255,255,255,.12);--input-bg:rgba(255,255,255,.04);--sel-bg:#18181e;--hover:rgba(255,255,255,.04);--shadow:rgba(0,0,0,.45);}
[data-theme="light"]{--bg:#f2f4f7;--bg2:#fff;--bg3:#e8eaef;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#0f0f12;--text2:rgba(15,15,18,.65);--text3:rgba(15,15,18,.4);--text4:rgba(15,15,18,.16);--input-bg:rgba(0,0,0,.03);--sel-bg:#f0f0f0;--hover:rgba(0,0,0,.025);--shadow:rgba(0,0,0,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cyan:#00CCCC;--rose:#E8197A;}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden;color:var(--text);transition:background .22s,color .22s;}
input,select,textarea{background:var(--input-bg);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;width:100%;transition:border-color .2s,background .2s;}
input:focus,select:focus,textarea:focus{border-color:#00CCCC;background:rgba(0,204,204,.06);}
input::placeholder,textarea::placeholder{color:var(--text4);}
select option{background:var(--sel-bg);}
button{cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .18s;}
textarea{resize:vertical;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(0,204,204,.3);border-radius:4px;}
@keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.appear{animation:appear .3s ease forwards;}
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:12px 20px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;animation:toastIn .22s ease;border:1px solid;}

</style>

function wallet(uid){if(!WALLETS[uid])WALLETS[uid]={credits:0,history:[],claimed:[]};return WALLETS[uid];}
function earnCredits(uid,amount,note){
  const w=wallet(uid);w.credits+=amount;
  const at=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  w.history.unshift({id:'wh'+Date.now(),type:'earn',amount,note,at});
}
function redeemVoucher(uid,voucherId){
  const v=VOUCHERS.find(x=>x.id===voucherId);const w=wallet(uid);
  if(!v)return toast('Voucher not found','err');
  if(w.credits<v.cost)return toast('Not enough credits — need '+v.cost+' 🪙','err');
  if(v.stock<1)return toast('This voucher is out of stock','err');
  w.credits-=v.cost;v.stock--;
  const at=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  const txn={id:'wh'+Date.now(),type:'redeem',amount:-v.cost,note:'Redeemed: '+v.name,at};
  w.history.unshift(txn);w.claimed.push(voucherId+'_'+Date.now());
  toast('🎉 '+v.name+' redeemed! Check your email for the voucher code.','ok');
  render();
}

/* ── THEME ── */
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme);render();}
function dk(d,l){return S.theme==='dark'?d:l;}

/* ── TOAST ── */
function toast(msg,type){
  const c=document.getElementById('tc');if(!c)return;
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  el.style.background=type==='err'?RO:dk('#0f0f12','#fff');
  el.style.color=type==='err'?'#fff':CY;el.style.borderColor=type==='err'?RO:CY;
  c.appendChild(el);setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},3500);
}

/* ── AUTH ── */
function doLogin(){
  const eEl=document.getElementById('le'),pEl=document.getElementById('lp'),errEl=document.getElementById('lerr');
  if(!eEl||!pEl)return;
  const u=USERS.find(x=>x.email===eEl.value.trim()&&x.pw===pEl.value);
  if(u){S.user=u;resetState();S.view=u.role==='admin'?'overview':(u.status==='pending'?'appstatus':'dashboard');render();}
  else{if(errEl)errEl.textContent='No account found — check your credentials.';}
}
function logout(){S.user=null;S.view='';resetState();render();}
function qFill(i){
  const C=[{e:'sarah@campus.edu',p:'pass123'},{e:'marcus@campus.edu',p:'pass123'},
    {e:'aisha@campus.edu',p:'pass123'},{e:'admin@resihub.co',p:'admin123'},{e:'manager@resihub.co',p:'admin123'}];
  const eEl=document.getElementById('le'),pEl=document.getElementById('lp'),errEl=document.getElementById('lerr');
  if(eEl)eEl.value=C[i].e;if(pEl)pEl.value=C[i].p;if(errEl)errEl.textContent='';
}

/* ── NAV (ROLE + STATUS GATES) ── */
const ADMIN_VIEWS=['overview','occupancy','allocations','tickets','newsmanager','accounts','visitorlog','rewards'];
const ACTIVE_VIEWS=['dashboard','maintenance','news','profile','documents','housemates','visitors','wallet'];
const PENDING_VIEWS=['appstatus','booking'];

function go(v){
  if(!S.user)return;
  const r=S.user.role,st=S.user.status;
  if(r==='admin'&&[...ACTIVE_VIEWS,...PENDING_VIEWS].includes(v)){toast('Access denied — student area','err');return;}
  if(r==='student'&&ADMIN_VIEWS.includes(v)){toast('Access denied — admin area only','err');return;}
  if(r==='student'&&st==='pending'&&!PENDING_VIEWS.includes(v)){
    toast('Your account is pending approval. Limited access only.','err');return;
  }
  S.view=v;render();
}

  const m={active:CY,paid:CY,signed:CY,resolved:CY,'in progress':RO,pending:RO,overdue:RO,open:RO,urgent:RO,normal:CY,low:'rgba(128,128,128,.5)'};
  const c=col||m[(text||'').toLowerCase()]||'rgba(128,128,128,.5)';

}

function kpi(label,val,note,accent){

function reserveRoom(){
  if(!S.bSelected)return;
  const room=ROOMS.find(r=>r.n===S.bSelected.n&&r.bl===S.bSelected.bl);
  if(!room)return;
  if(room.reserved||room.occ){toast('Room no longer available','err');S.bSelected=null;render();return;}
  room.reserved=true;room.reservedBy=S.user.id;room.reservedName=S.user.name;
  S.bDone=true;render();
}

/* ════════════════ STUDENT: MAINTENANCE (with media upload) ════════════════ */
function handleMediaUpload(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      S.rMedia.push({name:file.name,type:file.type,dataUrl:e.target.result,size:(file.size/1024).toFixed(0)+'KB'});
      render();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function removeMedia(idx){S.rMedia.splice(idx,1);render();}

function submitReport(){
  if(!S.rForm.desc.trim()){toast('Please describe the issue.','err');return;}
  if(!S.rForm.loc.trim()){toast('Please specify a location.','err');return;}
  const u=S.user;ticketCounter++;
  const ref='MR-0'+ticketCounter;
  const today=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const localId='t_'+Date.now();
  const newTicket={id:localId,studentId:u.id,studentName:u.name,studentAvatar:u.avatar,room:u.room||'—',block:u.block||'—',cat:S.rForm.cat,loc:S.rForm.loc,desc:S.rForm.desc,date:today,status:'Open',ref,priority:S.rForm.priority,adminNote:'',media:[...S.rMedia]};
  TICKETS.push(newTicket);
  S.rSubmitted=true;S.rMedia=[];render();toast('Report submitted — ref: '+ref,'ok');
}

/* ════════════════ STUDENT: HOUSEMATES + CHORES ════════════════ */
function claimChore(id){
  const c=CHORES.find(x=>x.id===id),u=S.user;
  if(!c)return;
  if(c.claimedBy===u.id){toast('You already claimed this chore.','err');return;}
  if(c.claimedBy){toast(c.claimedName+' already claimed this one.','err');return;}
  c.claimedBy=u.id;c.claimedName=u.name.split(' ')[0]+' '+u.name.split(' ')[1][0]+'.';
  earnCredits(u.id,CREDITS.CLAIM,'Claimed: '+c.name);
  toast('Chore claimed (+'+CREDITS.CLAIM+' 🪙) — complete it to earn '+CREDITS.COMPLETE+' more!','ok');
  render();
}
function unclaimChore(id){
  const c=CHORES.find(x=>x.id===id),u=S.user;
  if(!c||c.claimedBy!==u.id){toast('You cannot unclaim this.','err');return;}
  c.claimedBy=null;c.claimedName=null;
  const w=wallet(u.id);
  w.credits=Math.max(0,w.credits-CREDITS.CLAIM);
  w.history.unshift({id:'wh'+Date.now(),type:'deduct',amount:-CREDITS.CLAIM,note:'Unclaimed: '+c.name,at:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'})});
  toast('Chore unclaimed (-'+CREDITS.CLAIM+' 🪙 returned)','ok');render();
}
function completeChore(id){
  const c=CHORES.find(x=>x.id===id),u=S.user;
  if(!c)return;
  const now=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const dName=u.name.split(' ')[0]+' '+u.name.split(' ')[1][0]+'.';
  c.doneBy=u.id;c.doneName=dName;c.doneAt=now;
  c.log.unshift({who:dName,at:now,note:'Completed.'});
  c.claimedBy=null;c.claimedName=null;
  earnCredits(u.id,CREDITS.COMPLETE,'Completed: '+c.name);
  toast('Chore complete! +'+CREDITS.COMPLETE+' 🪙 credits earned — nice work!','ok');render();
}
function resetChore(id){
  const c=CHORES.find(x=>x.id===id);
  if(!c)return;
  c.doneBy=null;c.doneName=null;c.doneAt=null;
  toast('Chore reset for next cycle','ok');render();
}

/* ════════════════ STUDENT: VISITORS ════════════════ */
function generateQR(pass){
  // Simple SVG QR-like pattern (decorative, encodes pass data visually)
  const seed=pass.qr.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const cells=[];const size=9;
  for(let r=0;r<size;r++){for(let c=0;c<size;c++){
    // corners always filled (like real QR)
    const corner=(r<3&&c<3)||(r<3&&c>5)||(r>5&&c<3);
    const inner=(r>=1&&r<=1&&c>=1&&c<=1)||(r>=1&&r<=1&&c>=7&&c<=7)||(r>=7&&r<=7&&c>=1&&c<=1);
    const data=(seed*r*c+r*7+c*13)%3===0;
    cells.push({r,c,filled:corner||(!inner&&data)});
  }}
  return `<svg width="80" height="80" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <rect width="90" height="90" fill="white" rx="4"/>
    ${cells.map(({r,c,filled})=>filled?`<rect x="${c*10}" y="${r*10}" width="9" height="9" fill="#0f0f12"/>`:''). join('')}
    <rect x="0" y="0" width="30" height="30" fill="none" stroke="#0f0f12" stroke-width="3"/>
    <rect x="60" y="0" width="30" height="30" fill="none" stroke="#0f0f12" stroke-width="3"/>
    <rect x="0" y="60" width="30" height="30" fill="none" stroke="#0f0f12" stroke-width="3"/>
  </svg>`;
}

  if(f.from>=f.to)return toast('Departure must be after arrival','err');
  const u=S.user;
  const localId='vst'+visitorCounter++;
  const qr='QR-'+(u.room||'000')+'-'+f.date.replace(/-/g,'')+'-'+String(visitorCounter).padStart(3,'0');
  const visitDate=new Date(f.date);const now=new Date();
  visitDate.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const status=visitDate<now?'Expired':visitDate.getTime()===now.getTime()?'Active':'Upcoming';
  const pass={id:localId,hostId:u.id,hostName:u.name,hostRoom:u.room,hostBlock:u.block,
    visitorName:f.name,visitorPhone:f.phone||'—',date:f.date,timeFrom:f.from,timeTo:f.to,
    purpose:f.purpose||'Visit',status,checkedIn:false,checkedInAt:null,qr};
  VISITORS.push(pass);
  S.vForm={name:'',phone:'',date:'',from:'09:00',to:'18:00',purpose:''};
  S.visitorTab='mine';
  toast('Visitor pass created — share the QR code with your guest','ok');
  render();
}

function checkInVisitor(id){
  const v=VISITORS.find(x=>x.id===id);if(!v)return;

  v.checkedIn=true;v.checkedInAt=t;
  toast(v.visitorName+' checked in','ok');render();
}
function cancelVisitorPass(id){
  const idx=VISITORS.findIndex(v=>v.id===id);if(idx<0)return;
  const removed=VISITORS.splice(idx,1)[0];

}
function removeVisitorPass(id){
  const idx=VISITORS.findIndex(v=>v.id===id);if(idx<0)return;
  const removed=VISITORS.splice(idx,1)[0];

}

/* ════════════════ DOCUMENT REQUEST ════════════════ */
function requestDoc(docType){
  const u=S.user;
  const live=USERS.find(x=>x.id===u.id);
  if(!live)return;
  const localId='dr'+Date.now();
  const newDoc={id:localId,type:docType,date:new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'short',year:'numeric'}),amount:'—',status:'Requested'};
  if(!live.docs)live.docs=[];
  live.docs.unshift(newDoc);S.user.docs=live.docs;
  toast(docType+' requested — allow 2 business days','ok');render();
}

    </div>
    ${openTix>0||pending.length>0||reservedRms.length>0||overdue.length>0||(()=>{const low=VOUCHERS.filter(v=>v.stock<3).length;return low>0;})()? `
      <div style="border:1px solid rgba(232,25,122,.2);border-radius:10px;padding:16px 22px;background:rgba(232,25,122,.04);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${RO};text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;">Actions needed</div>
        ${[
          pending.length?{l:`${pending.length} pending application${pending.length>1?'s':''}`,nav:'allocations'}:null,
          reservedRms.length?{l:`${reservedRms.length} room reservation${reservedRms.length>1?'s':''} to allocate`,nav:'allocations'}:null,
          openTix?{l:`${openTix} open ticket${openTix>1?'s':''}`,nav:'tickets'}:null,
          overdue.length?{l:`${overdue.length} overdue account${overdue.length>1?'s':''}`,nav:'accounts'}:null,
          (()=>{const low=VOUCHERS.filter(v=>v.stock<3);return low.length?{l:`${low.length} voucher${low.length>1?'s':''} low/out of stock`,nav:'rewards'}:null;})()
        ].filter(Boolean).map(a=>`<span onclick="go('${a.nav}')" style="background:rgba(232,25,122,.1);border:1px solid rgba(232,25,122,.25);border-radius:20px;padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${RO};cursor:pointer;">${a.l} →</span>`).join('')}
      </div>`:''}
  </div>`);
}

/* ════════════════ ADMIN: OCCUPANCY ════════════════ */

  const res=blkRooms.filter(r=>r.reserved&&!r.occ).length;
  const vacant=blkRooms.length-occ-res;
  const pct=Math.round(occ/blkRooms.length*100);
  return shell(`<div style="padding:44px 40px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;">
      <div><div style="font-size:30px;font-weight:700;letter-spacing:-.03em;color:var(--text);">Occupancy</div><div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);margin-top:4px;">Live room status — reserved rooms need allocation</div></div>
      <div style="display:flex;gap:6px;">${['Block A','Block B','Block C'].map(b=>{const br=ROOMS.filter(r=>r.bl===b);const bo=br.filter(r=>r.occ).length;const bres=br.filter(r=>r.reserved&&!r.occ).length;return `<button onclick="S.occBlock='${b}';render()" style="background:${S.occBlock===b?CY:'transparent'};border:1px solid ${S.occBlock===b?CY:'rgba(0,204,204,.2)'};color:${S.occBlock===b?'#0f0f12':CY};padding:7px 16px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;">${b} <span style="opacity:.65;">${bo}${bres?'+'+bres+'r':''}/${br.length}</span></button>`;}).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:24px;">
      ${kpi('Total Rooms',blkRooms.length,'In '+S.occBlock,CY)}
      ${kpi('Occupied',occ,'Active residents',RO)}
      ${kpi('Reserved',res,res>0?'Pending allocation':'None pending',res>0?RO:CY)}
      ${kpi('Vacant',vacant,'Fully available',CY)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:20px;">
      ${blkRooms.map(r=>`<div style="border:1px solid ${r.occ?'rgba(232,25,122,.35)':r.reserved?'rgba(0,204,204,.4)':'var(--border)'};border-radius:10px;padding:13px;background:${r.occ?'rgba(232,25,122,.05)':r.reserved?'rgba(0,204,204,.05)':'var(--bg2)'};">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;">Room</div>
        <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:5px;">${r.n}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${r.occ?RO:r.reserved?CY:CY};text-transform:uppercase;letter-spacing:.06em;">${r.occ?'Occupied':r.reserved?'Reserved':'Vacant'}</div>
        ${r.who?`<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-top:4px;">${r.who}</div>`:''}
        ${r.reserved&&!r.occ?`<div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:${CY};margin-top:4px;opacity:.7;">→ ${r.reservedName||'Student'}</div>`:''}
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text4);margin-top:4px;">${r.type}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:16px;">
      <div style="display:flex;gap:7px;align-items:center;"><div style="width:12px;height:12px;border:1px solid var(--border2);border-radius:3px;background:var(--bg2);"></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);">Vacant</span></div>
      <div style="display:flex;gap:7px;align-items:center;"><div style="width:12px;height:12px;border:1px solid rgba(0,204,204,.4);border-radius:3px;background:rgba(0,204,204,.05);"></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);">Reserved (pending)</span></div>
      <div style="display:flex;gap:7px;align-items:center;"><div style="width:12px;height:12px;border:1px solid rgba(232,25,122,.35);border-radius:3px;background:rgba(232,25,122,.05);"></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);">Occupied</span></div>

/* ════════════════ ADMIN: ALLOCATIONS ════════════════ */
function vAllocations(){
  const active=USERS.filter(u=>u.role==='student'&&u.status==='active');
  const pending=USERS.filter(u=>u.role==='student'&&u.status==='pending');
  const reservations=ROOMS.filter(r=>r.reserved&&!r.occ);
  const tabC=()=>{
    if(S.allocTab==='current') return `<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:2.2fr 1fr 1.6fr 1fr 1fr 1fr;padding:12px 20px;background:var(--bg3);border-bottom:1px solid var(--border);">${['Resident','Room','University','Move-in','Rent','Actions'].map(h=>`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;">${h}</div>`).join('')}</div>
      ${active.length===0?`<div style="padding:32px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);background:var(--bg2);">No active allocations yet.</div>`:active.map((s,i)=>`<div style="display:grid;grid-template-columns:2.2fr 1fr 1.6fr 1fr 1fr 1fr;padding:14px 20px;border-bottom:${i<active.length-1?'1px solid var(--border)':'none'};align-items:center;background:var(--bg2);transition:background .12s;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='var(--bg2)'">
        <div style="display:flex;align-items:center;gap:11px;">${avi(s.avatar,30,CY,s.id)}<div><div style="font-size:13px;font-weight:500;color:var(--text);">${s.name}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${s.email}</div></div></div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${CY};">${s.room}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${s.uni.split(' ').slice(0,3).join(' ')}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);">${s.moveIn}</div>
        <div style="font-size:13px;font-weight:500;color:var(--text);">R${s.rent.toLocaleString()}</div>
        <div style="display:flex;gap:6px;">
          <button onclick="openStudentView('${s.id}')" style="background:transparent;border:1px solid rgba(0,204,204,.3);color:${CY};padding:4px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;" onmouseover="this.style.background='rgba(0,204,204,.08)'" onmouseout="this.style.background='transparent'">View</button>
          <button onclick="confirmRemoveRoom('${s.id}')" style="background:transparent;border:1px solid rgba(232,25,122,.3);color:${RO};padding:4px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;" onmouseover="this.style.background='rgba(232,25,122,.08)'" onmouseout="this.style.background='transparent'">Remove</button>
        </div>
      </div>`).join('')}
    </div>`;

    if(S.allocTab==='reservations'){
      if(!reservations.length) return `<div style="border:1px solid var(--border);border-radius:10px;padding:56px;text-align:center;background:var(--bg2);">
        <div style="font-size:32px;margin-bottom:12px;">🏠</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text3);">No pending room reservations at this time.</div>
      </div>`;
      return reservations.map(r=>{
        const student=USERS.find(u=>u.id===r.reservedBy);
        return `<div style="border:1px solid rgba(0,204,204,.3);border-radius:10px;padding:22px;margin-bottom:10px;background:rgba(0,204,204,.04);">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;">
            <div style="display:flex;align-items:center;gap:14px;">
              ${student?avi(student.avatar,48,CY,student.id):''}
              <div>
                <div style="font-size:16px;font-weight:600;color:var(--text);">${r.reservedName||'Unknown Student'}</div>
                ${student?`<div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-top:3px;">${student.uni||''} · ${student.program||''} · Year ${student.year||'—'}</div>`:''}
                <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
                  <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${CY};">Requested: Room ${r.n} · ${r.bl} · ${r.type}</span>
                  <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">R${r.price.toLocaleString()}/mo</span>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              ${student?`<button onclick="openStudentView('${student.id}')" style="background:transparent;border:1px solid rgba(0,204,204,.3);color:${CY};border-radius:8px;padding:8px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;" onmouseover="this.style.background='rgba(0,204,204,.08)'" onmouseout="this.style.background='transparent'">View Profile</button>`:''}
              <button onclick="allocateRoom('${r.reservedBy}','${r.n}')" style="background:${CY};color:#0f0f12;border:none;border-radius:8px;padding:9px 20px;font-weight:600;font-size:13px;" onmouseover="this.style.background='#00aaaa'" onmouseout="this.style.background='${CY}'">✓ Confirm & Allocate</button>
              <button onclick="cancelReservation('${r.n}');toast('Reservation declined','ok')" style="background:transparent;border:1px solid rgba(232,25,122,.4);color:${RO};border-radius:8px;padding:9px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;" onmouseover="this.style.background='rgba(232,25,122,.08)'" onmouseout="this.style.background='transparent'">Decline</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    if(S.allocTab==='pending'){
      if(!pending.length) return `<div style="border:1px solid var(--border);border-radius:10px;padding:48px;text-align:center;background:var(--bg2);"><div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text3);">No pending applications.</div></div>`;
      return pending.map(s=>`<div style="border:1px solid rgba(232,25,122,.2);border-radius:10px;padding:22px;margin-bottom:10px;background:rgba(232,25,122,.04);">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;">
          <div style="display:flex;align-items:center;gap:14px;">${avi(s.avatar,48,RO,s.id)}<div>
            <div style="font-size:16px;font-weight:600;color:var(--text);">${s.name}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);margin-top:3px;">${s.uni} · ${s.program} · Year ${s.year}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${RO};margin-top:6px;">New application — awaiting room assignment</div>

          <div style="display:flex;gap:8px;">
            <button onclick="approvePending('${s.id}')" style="background:${CY};color:#0f0f12;border:none;border-radius:8px;padding:9px 20px;font-weight:600;font-size:13px;" onmouseover="this.style.background='#00aaaa'" onmouseout="this.style.background='${CY}'">Approve & Assign Room →</button>
            <button onclick="rejectPending('${s.id}')" style="background:transparent;border:1px solid rgba(232,25,122,.4);color:${RO};border-radius:8px;padding:9px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;" onmouseover="this.style.background='rgba(232,25,122,.08)'" onmouseout="this.style.background='transparent'">Reject</button>
          </div>
        </div>
      </div>`).join('');
    }

    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">${[
      {t:'Monthly Invoices',d:'Generate March 2026 invoices for all residents',c:CY},
      {t:'Lease Agreements',d:'Draft lease docs for pending approvals',c:CY},
      {t:'Payment Reminders',d:'Automated reminders to overdue accounts',c:RO},
      {t:'Occupancy Report',d:'Export full occupancy data as PDF',c:CY},
      {t:'Revenue Summary',d:'Compile Q1 2026 financial overview',c:CY},
      {t:'Welcome Packs',d:'Onboarding pack for newly approved residents',c:CY}
    ].map(d=>`<div style="border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);">
      <div><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${d.t}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);">${d.d}</div></div>
      <button onclick="toast('${d.t} generated','ok')" style="background:transparent;border:1px solid ${d.c};color:${d.c};padding:7px 14px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;flex-shrink:0;margin-left:14px;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='transparent'">Generate</button>
    </div>`).join('')}</div>`;
  };
  const tabs=[
    {id:'current',  l:`Current (${active.length})`},
    {id:'reservations', l:`Reservations (${reservations.length})`,badge:reservations.length>0},
    {id:'pending',  l:`New Applications (${pending.length})`},
    {id:'generate', l:'Generate Docs'}
  ];
  return shell(`<div style="padding:44px 40px;">
    ${sH('Allocations','Room assignments, reservations and new applications')}
    <div style="display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;">
      ${tabs.map(t=>`<button onclick="S.allocTab='${t.id}';render()"
        style="background:${S.allocTab===t.id?RO:'transparent'};border:1px solid ${S.allocTab===t.id?RO:'rgba(232,25,122,.25)'};color:${S.allocTab===t.id?'#fff':RO};padding:6px 18px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;position:relative;">
        ${t.l}${t.badge&&S.allocTab!==t.id?`<span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:${RO};"></span>`:''}
      </button>`).join('')}
    </div>
    ${tabC()}
  </div>`);
}

/* ════════════════ ADMIN: TICKETS ════════════════ */
function updateTicketStatus(id,newStatus){
  const t=TICKETS.find(x=>x.id===id);if(!t)return;
  t.status=newStatus;
  toast('Ticket '+t.ref+' → '+newStatus,'ok');render();
}
function saveAdminNote(id){
  const el=document.getElementById('note_'+id);if(!el)return;
  const t=TICKETS.find(x=>x.id===id);if(!t)return;
  t.adminNote=el.value;
  delete S.atNoteEdit[id];
  toast('Note saved for '+t.ref,'ok');render();
}

function vAdminTickets(){

  const cnt={All:TICKETS.length,Open:TICKETS.filter(t=>t.status==='Open').length,'In Progress':TICKETS.filter(t=>t.status==='In Progress').length,Resolved:TICKETS.filter(t=>t.status==='Resolved').length};

      <div style="width:1px;height:24px;background:var(--border2);"></div>
      <div style="display:flex;gap:5px;">${pfx.map(f=>`<button onclick="S.atPriority='${f}';render()" style="background:${S.atPriority===f?'rgba(0,204,204,.15)':'transparent'};border:1px solid ${S.atPriority===f?CY:'rgba(0,204,204,.2)'};color:${CY};padding:5px 13px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;">${f}</button>`).join('')}</div>

                  <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;">${t.ref} · ${t.studentName} · Room ${t.room} ${t.block} · ${t.date}</div>

                  ${isRes?`<button onclick="updateTicketStatus('${t.id}','Open')" style="background:transparent;border:1px solid rgba(232,25,122,.3);color:${RO};border-radius:6px;padding:6px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;" onmouseover="this.style.background='rgba(232,25,122,.06)'" onmouseout="this.style.background='transparent'">Reopen</button>`:''}

function publishNews(){
  const f=S.anForm;
  if(!f.title.trim()){toast('Title is required.','err');return;}
  if(!f.body.trim()){toast('Body is required.','err');return;}
  const tagCol={Maintenance:RO,WiFi:CY,Grounds:CY,Notice:RO,Survey:CY,Event:CY};
  const typeMap={Maintenance:'maintenance',WiFi:'wifi',Grounds:'grounds',Notice:'notice',Survey:'notice',Event:'grounds'};
  const u=S.user;
  if(f.pinned) NEWS.forEach(n=>n.pinned=false);
  const localId='n'+newsCounter++;
  const item={id:localId,type:typeMap[f.tag]||'notice',tag:f.tag,tagCol:tagCol[f.tag]||CY,pinned:f.pinned,authorId:u.id,authorName:u.name,title:f.title,body:f.body,date:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
  NEWS.unshift(item);
  S.anForm={title:'',tag:'Maintenance',type:'maintenance',body:'',pinned:false};S.anTab='list';
  toast('Post published — students can see it now','ok');render();
}
function deleteNews(id){
  const i=NEWS.findIndex(n=>n.id===id);
  if(i<0)return;
  const removed=NEWS.splice(i,1)[0];
  toast('Post deleted','ok');render();
}
function pinNews(id){
  NEWS.forEach(n=>n.pinned=false);
  const n=NEWS.find(x=>x.id===id);
  if(n){n.pinned=true;toast('"'+n.title+'" pinned','ok');render();}
}
function unpinNews(id){
  const n=NEWS.find(x=>x.id===id);
  if(n){n.pinned=false;toast('Post unpinned','ok');render();}
}

/* ════════════════ ALLOCATION LOGIC ════════════════ */
function cancelReservation(roomNum){
  const room=ROOMS.find(r=>r.n===roomNum);
  if(room){room.reserved=false;room.reservedBy=null;room.reservedName=null;}
  S.bDone=false;S.bSelected=null;
  toast('Booking request cancelled — room is now available again','ok');
  render();
}

function approvePending(sid){openRoomPicker(sid);}
function rejectPending(sid){
  const idx=USERS.findIndex(u=>u.id===sid);
  if(idx<0)return;
  const removed=USERS.splice(idx,1)[0];
  S.modal=null;toast(removed.name+' — application rejected','ok');render();
}
function allocateRoom(sid,roomNum){
  const student=USERS.find(u=>u.id===sid);
  const room=ROOMS.find(r=>r.n===roomNum);
  if(!student||!room)return;
  if(student.room){
    const old=ROOMS.find(r=>r.n===student.room&&r.bl===student.block);
    if(old){old.occ=false;old.who=null;}
  }
  student.room=roomNum;student.block=room.bl;student.status='active';
  student.moveIn=new Date().toISOString().split('T')[0];student.rent=room.price;
  room.occ=true;room.reserved=false;room.reservedBy=null;room.reservedName=null;
  room.who=student.name.split(' ')[0]+' '+student.name.split(' ')[1][0]+'.';
  S.modal=null;S.allocTab='current';
  toast(student.name+' allocated to Room '+roomNum+' · '+room.bl,'ok');render();
}
function removeRoomConfirmed(sid){
  const student=USERS.find(u=>u.id===sid);
  if(!student||!student.room)return;
  const room=ROOMS.find(r=>r.n===student.room&&r.bl===student.block);
  if(room){room.occ=false;room.who=null;}
  const oldRoom=student.room;
  student.room=null;student.block=null;student.rent=0;student.moveIn=null;
  S.modal=null;toast(student.name+' removed from Room '+oldRoom,'ok');render();
}

/* ════════════════ DOCUMENT DOWNLOAD ════════════════ */
function downloadDoc(docId,uid){
  const student=USERS.find(u=>u.id===uid)||S.user;
  const doc=student.docs.find(d=>d.id===docId);
  if(!doc)return;
  const html=generateDocHTML(doc,student);
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='ResiHub_'+doc.type+'_'+doc.date.replace(/\s/g,'_')+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);toast('Downloading '+doc.type+' — '+doc.date,'ok');
}

/* ════════════════ PHOTO UPLOAD ════════════════ */
function handlePhotoUpload(input,uid){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('Image too large — max 5MB','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    PHOTOS[uid]=e.target.result;
    toast('Profile photo updated ✓','ok');render();
  };
  reader.readAsDataURL(file);
}

function openGrantCredits(sid){S.modal={type:'grantCredits',data:{sid,amount:20,note:''}};render();}
function doGrantCredits(sid){
  const m=S.modal;if(!m||m.type!=='grantCredits')return;
  const amt=parseInt(m.data.amount)||0;
  const note=m.data.note.trim()||'Admin credit adjustment';
  if(amt===0)return toast('Enter a non-zero amount','err');
  const s=USERS.find(u=>u.id===sid);if(!s)return;
  const w=wallet(sid);
  const newBal=w.credits+amt;
  if(newBal<0)return toast('Cannot reduce below 0 — current balance is '+w.credits+' 🪙','err');
  w.credits=newBal;
  const at=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  const txn={id:'wh'+Date.now(),type:amt>0?'earn':'deduct',amount:amt,note:'Admin: '+note,at};
  w.history.unshift(txn);
  S.modal=null;
  toast((amt>0?'Granted +':'Adjusted ')+Math.abs(amt)+' 🪙 to '+s.name,'ok');
  render();
}
function restockVoucher(vid,qty){
  const v=VOUCHERS.find(x=>x.id===vid);if(!v)return;
  v.stock+=qty;
  toast(v.name+' restocked — '+v.stock+' available','ok');render();
}

  const allRedemptions=Object.entries(WALLETS).flatMap(([uid,w])=>{
    const s=USERS.find(u=>u.id===uid);
    return w.history.filter(h=>h.type==='redeem').map(h=>({...h,studentName:s?s.name:'—',studentId:uid}));
  }).sort((a,b)=>b.id.localeCompare(a.id));
  const totalCreditsIssued=Object.values(WALLETS).reduce((sum,w)=>sum+w.history.filter(h=>h.type==='earn').reduce((s,h)=>s+h.amount,0),0);
  const totalRedeemed=Object.values(WALLETS).reduce((sum,w)=>sum+w.history.filter(h=>h.type==='redeem').reduce((s,h)=>s+Math.abs(h.amount),0),0);
  const totalCurrent=Object.values(WALLETS).reduce((sum,w)=>sum+w.credits,0);
  const rewardsTabs=[{id:'wallets',l:'Student Wallets'},{id:'vouchers',l:'Voucher Stock'},{id:'log',l:'Redemption Log ('+allRedemptions.length+')'}];

  return shell(`<div style="padding:44px 40px;">
    ${sH('Rewards Manager','Track credits, manage voucher stock and adjust balances')}

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:26px;">
      ${kpi('Total Credits Live',totalCurrent+' 🪙','Across all active wallets',CY)}
      ${kpi('Credits Issued',totalCreditsIssued+' 🪙','From chore completions',CY)}
      ${kpi('Credits Redeemed',totalRedeemed+' 🪙','Vouchers claimed',RO)}
      ${kpi('Vouchers in Stock',VOUCHERS.reduce((s,v)=>s+v.stock,0),'Available to redeem',CY)}
    </div>

    <!-- TABS -->
    <div style="display:flex;gap:6px;margin-bottom:22px;">
      ${rewardsTabs.map(t=>`
        <button onclick="S.adminRewardsTab='${t.id}';render()" style="background:${S.adminRewardsTab===t.id?RO:'transparent'};border:1px solid ${S.adminRewardsTab===t.id?RO:'rgba(232,25,122,.25)'};color:${S.adminRewardsTab===t.id?'#fff':RO};padding:7px 22px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;">${t.l}</button>`).join('')}
    </div>

    ${S.adminRewardsTab==='wallets'?`
      <!-- STUDENT WALLETS TABLE -->
      <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:12px 20px;background:var(--bg3);border-bottom:1px solid var(--border);">
          ${['Resident','Balance','Earned','Redeemed','Actions'].map(h=>`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;">${h}</div>`).join('')}
        </div>
        ${students.map((s,i)=>{
          const w=wallet(s.id);
          const earned=w.history.filter(h=>h.type==='earn').reduce((sum,h)=>sum+h.amount,0);
          const redeemed=Math.abs(w.history.filter(h=>h.type==='redeem').reduce((sum,h)=>sum+h.amount,0));
          const choresDone=CHORES.filter(c=>c.doneBy===s.id).length;
          return `<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:14px 20px;border-bottom:${i<students.length-1?'1px solid var(--border)':'none'};align-items:center;background:var(--bg2);transition:background .12s;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='var(--bg2)'">
            <div style="display:flex;align-items:center;gap:11px;">
              ${avi(s.avatar,30,CY,s.id)}
              <div>
                <div style="font-size:13px;font-weight:500;color:var(--text);">${s.name}</div>
                <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${choresDone} chore${choresDone!==1?'s':''} completed</div>
              </div>
            </div>
            <div style="font-size:16px;font-weight:700;color:${CY};">${w.credits} 🪙</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);">+${earned}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${redeemed>0?RO:'var(--text3)'};">${redeemed>0?'-'+redeemed:'—'}</div>
            <div style="display:flex;gap:6px;">
              <button onclick="openGrantCredits('${s.id}')" style="background:transparent;border:1px solid rgba(0,204,204,.3);color:${CY};padding:4px 12px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;" onmouseover="this.style.background='rgba(0,204,204,.08)'" onmouseout="this.style.background='transparent'">Adjust</button>
              <button onclick="openStudentView('${s.id}')" style="background:transparent;border:1px solid var(--border2);color:var(--text3);padding:4px 10px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;" onmouseover="this.style.borderColor='${CY}';this.style.color='${CY}'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text3)'">View</button>
            </div>
          </div>`;
        }).join('')}
        ${students.length===0?`<div style="padding:40px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);background:var(--bg2);">No active students yet.</div>`:''}
      </div>
    `
    :S.adminRewardsTab==='vouchers'?`
      <!-- VOUCHER STOCK MANAGEMENT -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
        ${VOUCHERS.map(v=>{
          const timesRedeemed=Object.values(WALLETS).reduce((sum,w)=>sum+w.history.filter(h=>h.note&&h.note.includes(v.name)).length,0);
          return `<div style="border:1px solid ${v.stock===0?'rgba(232,25,122,.3)':'var(--border)'};border-radius:12px;padding:20px;background:var(--bg2);">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
              <div style="font-size:32px;">${v.icon}</div>
              <div style="text-align:right;">
                <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;">Stock</div>
                <div style="font-size:22px;font-weight:700;color:${v.stock===0?RO:v.stock<5?'#FFD700':CY};">${v.stock}</div>
              </div>
            </div>
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${v.name}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:12px;">${v.cost} 🪙 · ${timesRedeemed} redeemed total</div>
            <div style="display:flex;gap:7px;">
              <button onclick="restockVoucher('${v.id}',5)" style="flex:1;background:transparent;border:1px solid rgba(0,204,204,.3);color:${CY};padding:7px 0;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;" onmouseover="this.style.background='rgba(0,204,204,.08)'" onmouseout="this.style.background='transparent'">+5 Stock</button>
              <button onclick="restockVoucher('${v.id}',10)" style="flex:1;background:transparent;border:1px solid rgba(0,204,204,.3);color:${CY};padding:7px 0;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;" onmouseover="this.style.background='rgba(0,204,204,.08)'" onmouseout="this.style.background='transparent'">+10 Stock</button>
              ${v.stock>0?`<button onclick="if(confirm('Set ${v.name} stock to 0?')){VOUCHERS.find(x=>x.id==='${v.id}').stock=0;toast('${v.name} set out of stock','ok');render()}" style="background:transparent;border:1px solid rgba(232,25,122,.25);color:${RO};padding:7px 10px;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;" onmouseover="this.style.background='rgba(232,25,122,.06)'" onmouseout="this.style.background='transparent'">Out of Stock</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    `:`
      <!-- REDEMPTION LOG -->
      ${allRedemptions.length===0?`<div style="border:1px dashed var(--border2);border-radius:10px;padding:56px;text-align:center;"><div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text3);">No redemptions yet.</div></div>`:`
      <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <div style="display:grid;grid-template-columns:1.6fr 2fr 1fr 1fr;padding:12px 20px;background:var(--bg3);border-bottom:1px solid var(--border);">
          ${['Student','Voucher','Credits','Date'].map(h=>`<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;">${h}</div>`).join('')}
        </div>
        ${allRedemptions.map((h,i)=>`<div style="display:grid;grid-template-columns:1.6fr 2fr 1fr 1fr;padding:12px 20px;border-bottom:${i<allRedemptions.length-1?'1px solid var(--border)':'none'};align-items:center;background:var(--bg2);">
          <div style="font-size:13px;color:var(--text);">${h.studentName}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);">${h.note.replace('Redeemed: ','')}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:${RO};">${h.amount} 🪙</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${h.at}</div>
        </div>`).join('')}
      </div>`}
    `}
  </div>`);
}


function startLandingCounters(){
  function animCount(id,end,suffix,dur){
    const el=document.getElementById(id);if(!el)return;
    const start=performance.now();
    function step(now){
      const p=Math.min((now-start)/dur,1);
      const ease=1-Math.pow(1-p,3);
      el.textContent=Math.round(ease*end)+(suffix||'');
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  setTimeout(()=>{
    animCount('ls1',847,'',1400);
    animCount('ls2',94,'%',1200);
    animCount('ls3',51,'',1000);
    animCount('ls4',3,'',800);
  },300);
}

/* ════════════════ RENDER ════════════════ */
function render(){
  const app=document.getElementById('app');if(!app)return;
  if(!S.user){app.innerHTML=vLogin();startLandingCounters();return;}
  const r=S.user.role,st=S.user.status;
  let content='';

  if(r==='student'&&st==='pending'){
    if(S.view==='booking')        content=vBooking();
    else                          {S.view='appstatus';content=vAppStatus();}
  } else if(r==='student'){
    if(S.view==='dashboard')       content=vDashboard();
    else if(S.view==='maintenance') content=vMaintenance();
    else if(S.view==='news')        content=vNews();
    else if(S.view==='visitors')    content=vVisitors();
    else if(S.view==='housemates')  content=vHousemates();
    else if(S.view==='wallet')      content=vWallet();
    else if(S.view==='profile')     content=vProfile();
    else if(S.view==='documents')   content=vDocuments();
    else{S.view='dashboard';content=vDashboard();}
  } else {
    if(S.view==='overview')         content=vOverview();
    else if(S.view==='occupancy')   content=vOccupancy();
    else if(S.view==='allocations') content=vAllocations();
    else if(S.view==='tickets')     content=vAdminTickets();
    else if(S.view==='newsmanager') content=vAdminNewsManager();
    else if(S.view==='visitorlog')  content=vVisitorLog();
    else if(S.view==='rewards')     content=vAdminRewards();
    else if(S.view==='accounts')    content=vAccounts();
    else{S.view='overview';content=vOverview();}
  }
  app.innerHTML=content;
}

render();
</script>
