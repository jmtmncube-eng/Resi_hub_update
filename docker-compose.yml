version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resihub
      POSTGRES_PASSWORD: resihub
      POSTGRES_DB: resihub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resihub -d resihub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: resihub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://resihub:resihub@postgres:5432/resihub_db?schema=public
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      STORAGE_TYPE: local
      UPLOAD_DIR: ./uploads
    ports:
      - "5000:5000"
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: resihub-frontend
    restart: unless-stopped
    environment:
      # FRONTEND_PORT lets each environment pick a port that isn't taken
      # (the VPS already has athera-app holding :3000, so we expose :3010 there).
      # Locally you can keep .env empty and it defaults to 3000.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
      VITE_APP_NAME: ResiHub
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_uploads:
