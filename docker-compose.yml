services:
  postgres:
    image: postgres:15-alpine
    container_name: resihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resihub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resihub}
      POSTGRES_DB: resihub_db
    # Bound to loopback only — the DB must never be reachable from the
    # public internet. The backend talks to it over the internal docker
    # network ("postgres:5432"); 127.0.0.1 just keeps a local psql usable.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resihub -d resihub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: resihub-backend
    restart: unless-stopped
    environment:
      # Secrets come from .env (gitignored). The :- fallbacks keep local
      # dev one-command, but they are intentionally NOT production-grade —
      # deploy.sh generates strong JWT secrets into .env on the VPS.
      DATABASE_URL: postgresql://resihub:${POSTGRES_PASSWORD:-resihub}@postgres:5432/resihub_db?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-not-for-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-only-refresh-secret-not-for-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STORAGE_TYPE: local
      UPLOAD_DIR: ./uploads
    # API + Prisma Studio bound to loopback — nginx (same host) proxies
    # the API; nothing should hit :5000 / :5555 directly from outside.
    ports:
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Shared frontend config. The dev vs prod difference (Vite dev server
  # vs static nginx build) lives in the two override files:
  #   docker-compose.override.yml  — auto-loaded for local dev
  #   docker-compose.prod.yml      — used by deploy.sh on the VPS
  # One of those supplies command + ports + (dev) volumes. Keeping them
  # OUT of this base file avoids Docker Compose's list-merge gotcha
  # (ports/volumes concatenate across files instead of replacing).
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: resihub-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
      VITE_APP_NAME: ResiHub
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
